name: DevSecOps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: taskapi
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: src
        run: npm test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: src/coverage/

  security:
    name: Security scans
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SAST with Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: SCA with Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: SCA with Grype filesystem scan
        uses: anchore/scan-action@v6
        with:
          path: .
          fail-build: true
          severity-cutoff: critical

      - name: Secret detection with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: Build, scan and package image
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Container scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: taskapi:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Container scan with Grype
        uses: anchore/scan-action@v6
        with:
          image: taskapi:${{ github.sha }}
          fail-build: true
          severity-cutoff: critical

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: taskapi:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json

  deploy:
    name: Kubernetes deploy check
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client -f k8s/
